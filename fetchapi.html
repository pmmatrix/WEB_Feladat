    <main class="alap">
    <div class="tablazat">
    <h2>Versenyhétvégék (Szerver oldali - Fetch API)</h2>
    <br>
    <label for="nev">Verseny neve</label>
    <input type="text" name="nev" id="nev" >
    <label for="helszin">Helyszín</label>
    <input type="text" name="helyszin"id="helyszin">
    <label for="datum">Dátum</label>
    <input type="date"name="datum" id="datum" onfocus="this.showPicker()"  onmousedown="this.showPicker()" onkeydown="return false;">
    <button  class="gomb" onclick="mentes()">Rögzítés</button>
    </div>
    <ul id="lista"></ul>
</main>

<script>
    const API_URL = 'api.php';

    async function betoltes() {
        const res = await fetch(API_URL);
        const adatok = await res.json();
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        adatok.forEach(palya => {
            lista.innerHTML += `<div class="tablazat">
        <table class="list" id="lista">
			<thead>
				<tr>
					<th>Verseny neve</th>
					<th>Helyszín</th>
					<th>Időpont</th>
					<th>Módosítás</th>
				</tr>
                    {gp.map(palya => (
                        <tr key={palya.azon}>
                            <td>{palya.nev}</td>
                            <td>{palya.helyszin}</td>
                            <td>{palya.datum}</td>
                            <td><a onClick={() => torol(palya.azon)} id="torol">Törlés</a></td>
                        </tr>
                    ))}
                </thead>
                </table>
                </div>`;
        });
    }

    async function mentes() {
        const nev = document.getElementById('nev').value;
        const helyszin = document.getElementById('cim').value;
        const datum = document.getElementById('datum').value;

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nev, helyszin, datum })
        });
        betoltes();
    }

    async function torles(id) {
        await fetch(API_URL, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ azon: id })
        });
        betoltes();
    }

    betoltes();
</script>
