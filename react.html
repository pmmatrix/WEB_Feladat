<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


    <title>WEB Beadandó</title>
</head>
<body>
    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>

        <nav>
            <a href="index.html">Főoldal</a>
            <a href="javascript.html">CRUD</a>
            <a href="react.html">REACT</a>
            <a href="spa.html">SPA</a>
            <a href="fetchapi.html">Fetch API</a>
            <a href="axios.html">Axios</a>
            <a href="oojs.html">OOJS</a>
        </nav>
    </header>
<main id="root"></main>
<script type="text/babel">
    const { useState, useEffect } = React;
    const API_URL = 'api.php';

    function App() {
        const [gp, setGp] = useState([]);
        const [nev, setNev] = useState("");
        const [datum, setDatum] = useState("");
        const [helyszin, setHelyszin] = useState("");

        const betolt = () => {
            fetch(API_URL)
                .then(res => res.json())
                .then(data => { if (Array.isArray(data)) setGp(data); });
        };

        useEffect(() => { betolt(); }, []);

        const hozzaad = () => {
            if (nev && helyszin && datum) {
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nev: nev, helszin: helyszin,datum :datum })
                }).then(() => { betolt(); setNev(""); setHelyszin(""); setDatum(""); });
            }
        };

        const torol = (id) => {
            fetch(API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ azon: id })
            }).then(() => betolt());
        };

        return (
            <div>
            <div className="tablazat">
                <h2>Versenyek (React CRUD + API)</h2>
                <br/>
                <div>
                    <label htmlFor="palya">Pálya</label>
                    <input type="text" name="palya" value={nev} onChange={(e) => setNev(e.target.value)} />
                </div>
                <div>
                    <label htmlFor="helyszin">Helyszín</label>
                    <input type="text" name="helyszin" value={helyszin} onChange={(e) => setHelyszin(e.target.value)} />
                </div>
                <div>
                    <label htmlFor="datum">Dátum</label>
                    <input type="date" name="datum" value={datum} onChange={(e) => setDatum(e.target.value)} onFocus={(e) => e.target.showPicker()} onMouseDown={(e) => e.target.showPicker()} onKeyDown={(e) => e.preventDefault()} />
                </div>
                <div>
                    <button className="gomb" onClick={hozzaad} >Rögzítés</button>
                </div>
                
            </div>

            <div className="tablazat">
        <table className="list" id="lista">
			<thead>
				<tr>
					<th>Verseny neve</th>
					<th>Helyszín</th>
					<th>Időpont</th>
					<th>Módosítás</th>
				</tr>
			</thead>
			<tbody>

			</tbody>
            
		</table>
                <ul>
                    {gp.map(palya => (
                        <li key={palya.azon}>
                            <div style={{flex: 1}}><strong>{palya.nev}</strong> <span style={{color: '#aaa'}}>({palya.helyszin})</span> <span>({palya.datum})</span></div>
                            <button onClick={() => torol(palya.azon)} style={{marginLeft: '10px', backgroundColor: '#e50914'}}>Törlés</button>
                        </li>
                    ))}
                </ul>

                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

    <footer>Gyurászik György Marcell - ZX4R0A | Patkós Máté - CS9R44</footer>
</body>
</html>
