<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>WEB Beadandó - OOJS Verseny</title>
</head>
<body>
    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
        <nav>
            <a href="index.html">Főoldal</a>
            <a href="javascript.html">CRUD</a>
            <a href="react.html">REACT</a>
            <a href="spa.html">SPA</a>
            <a href="fetchapi.html">Fetch API</a>
            <a href="axios.html">Axios</a>
            <a href="oojs.html">OOJS</a>
        </nav>
    </header>

    <main>
        <div class="versenyek">
            <h2>F1 Célbaérési Szimuláció</h2>
            <button class="gomb" onclick="ujversenyzo()">Új versenyző</button>
            <button  class="gomb hide" id="gaz" onclick="gyorsit()">GÁZ!</button>
        

        <div id="versenypalya" class="tablazat">
            <div class="celvonal"></div>
            <div class="finish"> FINISH</div>
        </div></div>
    </main>

    <footer>Gyurászik György Marcell - ZX4R0A | Patkós Máté - CS9R44</footer>

    <script>
        class Jarmu {
            constructor(tipus, szin) {
                this.tipus = tipus;
                this.szin = szin;
                this.tavolsag = 0;
            }

            vazGeneralas() {
                const div = document.createElement('div');
                div.style.position = 'absolute';
                div.style.left = '10px';
                div.style.transition = 'left 0.2s linear';
                return div;
            }
        }

        class Versenyauto extends Jarmu {
            constructor(tipus, szin, pilota) {
                super(tipus, szin);
                this.pilota = pilota;
                this.celban = false;
            }

            megjelenit() {
                document.getElementById("gaz").classList.remove("hide");
                const palya = document.getElementById('versenypalya');
                const autoDiv = this.vazGeneralas();
                autoDiv.id = 'f1-auto';
                
                autoDiv.innerHTML = `
                    <div style="font-size: 50px; line-height: 1; transform: scaleX(-1); width: 60px;">🏎️</div>
                    <div style="color: ${this.szin}; font-weight: bold; text-align: center; font-size: 14px; background: rgba(0,0,0,0.5); border-radius: 4px;">${this.pilota}</div>
                `;

                palya.appendChild(autoDiv);
            }

            mozgas() {
                if (this.celban) return alert("Győzelem!");

                const elem = document.getElementById('f1-auto');
                const palya = document.getElementById('versenypalya');
                const celvonal = document.querySelector('.celvonal');
                
                const autoSzelesseg = 60; 
                const celvonalEleje = palya.offsetWidth - celvonal.offsetWidth;

                this.tavolsag += 70;

                if (this.tavolsag + autoSzelesseg >= celvonalEleje) {
                    this.tavolsag = celvonalEleje - autoSzelesseg;
                    this.celban = true;
                    
                }

                elem.style.left = this.tavolsag + 'px';
            }
        }

        let versenyzo = null;

        function ujversenyzo() {
            const regi = document.getElementById('f1-auto');
            if (regi) regi.remove();

            const nev = prompt("Pilóta neve:", "Norris");
            if (nev) {
                versenyzo = new Versenyauto('F1', '#3498db', nev);
                versenyzo.megjelenit();
            }
        }

        function gyorsit() {
            if (versenyzo) {
                versenyzo.mozgas();
            }
        }
    </script>
</body>
</html>
