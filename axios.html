<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>WEB Beadandó</title>
</head>
<body>
    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>

        <nav>
            <a href="index.html">Főoldal</a>
            <a href="javascript.html">CRUD</a>
            <a href="react.html">REACT</a>
            <a href="spa.html">SPA</a>
            <a href="fetchapi.html">Fetch API</a>
            <a href="axios.html">Axios</a>
            <a href="oojs.html">OOJS</a>
        </nav>
    </header>

   <main id="root"></main>

<script type="text/babel">
    const { useState, useEffect } = React;
    const API_URL = 'api.php';

    function App() {
        const [gp, setGp] = useState([]);
        const [nev, setNev] = useState("");
        const [datum, setDatum] = useState("");
        const [helyszin, setHelyszin] = useState("");
        const [hiba, setHiba] = useState("");
         const [mod,setMod]=useState(null);

        const betolt = () => {
            axios.get(API_URL)
                .then(res => { if (Array.isArray(res.data)) { setGp(res.data); } else { setGp([]); } })
                .catch(err => setHiba("Nem sikerült kapcsolódni az adatbázishoz. Ellenőrizd a kapcsolat.php-t!"));
        };

        useEffect(() => { betolt(); }, []);

        const hozzaad = () => {
            if(nev && helyszin && datum) {
                axios.post(API_URL, { nev: nev, helyszin: helyszin , datum: datum}).then(() => { betolt(); setNev(""); setHelyszin(""); setDatum(""); });
            }
        };

        const torol = (id) => {
            axios.delete(API_URL, { data: { azon: id } }).then(() => betolt());
        };

         const modosit = (idx) =>{
            setNev(gp[idx].nev);
            setHelyszin(gp[idx].helyszin);
            setDatum(gp[idx].datum);
            setMod(gp[idx].azon);
        }
        const megse =() =>{
             setNev("");
            setHelyszin("");
            setDatum("");
            setMod(null);
        }
        const modositveg=() =>{
            axios.put(API_URL,{ nev: nev, helyszin: helyszin,datum :datum,azon:mod }).then(() => { betolt(); setNev(""); setHelyszin(""); setDatum(""); setMod(null); });
        }





        return (
            <div>
            <div className="tablazat">
                <h2>Versenyek (Axios)</h2>
                <br/>
                <div>
                    <label htmlFor="palya">Verseny neve</label>
                    <input type="text" name="palya" required value={nev} onChange={(e) => setNev(e.target.value)} />
                </div>
                <div>
                    <label htmlFor="helyszin">Helyszín</label>
                    <input type="text" name="helyszin" required value={helyszin} onChange={(e) => setHelyszin(e.target.value)} />
                </div>
                <div>
                    <label htmlFor="datum">Dátum</label>
                    <input type="date" name="datum" required value={datum} onChange={(e) => setDatum(e.target.value)} onFocus={(e) => e.target.showPicker()} onMouseDown={(e) => e.target.showPicker()} onKeyDown={(e) => e.preventDefault()} />
                </div>
                <div>
                    { mod ? 
                        <>
                        <button className="gomb" onClick={modositveg} >Módosítás</button>   <button className="gomb" onClick={megse}>Mégsem</button>
                        
                        </>
                        :<button className="gomb" onClick={hozzaad} >Rögzítés</button>
                    }
                </div>
                
            </div>

            <div className="tablazat">
        <table className="list" id="lista">
			<thead>
				<tr>
					<th>Verseny neve</th>
					<th>Helyszín</th>
					<th>Időpont</th>
					<th>Módosítás</th>
				</tr>
                    {gp.map((palya,idx) => (
                        <tr key={palya.azon}>
                            <td>{palya.nev}</td>
                            <td>{palya.helyszin}</td>
                            <td>{palya.datum}</td>
                            <td>
                             <a onClick={()=> modosit(idx)} id="modosit">Módosítás</a>
                             <a onClick={() => torol(palya.azon)} id="torol">Törlés</a>
                             </td>
                        </tr>
                    ))}
                </thead>
                </table>
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

    <footer>Gyurászik György Marcell - ZX4R0A | Patkós Máté - CS9R44</footer>
</body>
</html>
