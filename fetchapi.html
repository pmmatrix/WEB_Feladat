<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

        <h1>Web programozás-1 Előadás Házi feladat</h1>

        </nav>
    </header>

    <main class="alap">
    <div class="tablazat">
        <h2>Versenyhétvégék (Szerver oldali - Fetch API)</h2>
        <br>
        <label for="nev">Verseny neve</label>
        <input type="text" name="nev" id="nev" value="" required>
        <label for="helyszin">Helyszín</label>
        <input type="text" name="helyszin"id="helyszin" value="" required>
        <label for="datum">Dátum</label>
        <input type="date"name="datum" id="datum" value="" onfocus="this.showPicker()"  onmousedown="this.showPicker()" onkeydown="return false;" required>
        <div id="modositment"><button  class="gomb" onclick="mentes()">Rögzítés</button></div>
    </div>
    <div class="tablazat">
        <table class="list" id="lista">
			
        </table>
        <ul id="lista"></ul>
    </div>
    
</main>

<script>
    const API_URL = 'api.php';
    let tábla=[];
    async function betoltes() {
        const res = await fetch(API_URL);
        const adatok = await res.json();
        const lista = document.getElementById('lista');
       
        lista.innerHTML = '';
        lista.innerHTML+=`<thead>
				<tr>
					<th>Verseny neve</th>
					<th>Helyszín</th>
					<th>Időpont</th>
					<th>Módosítás</th>
				</tr>
            </thead>`;
        adatok.forEach((palya,idx) => {
            let tr=document.createElement('tr');
            tr.key=palya.azon;
            let tdnev=document.createElement('td');
            tdnev.innerText=palya.nev;
            let tdhelyszin=document.createElement('td');
            tdhelyszin.innerText=palya.helyszin;
            let tddatum=document.createElement('td');
            tddatum.innerText=palya.datum;
            let tdtorles=document.createElement('td');
            let torlesgomb=document.createElement('a');
            let modositgomb=document.createElement('a');
            torlesgomb.innerText='Törlés';
            torlesgomb.addEventListener('click',function(){torles(palya.azon)});
            torlesgomb.id="torol";
            modositgomb.addEventListener('click',function(){modosit(idx)})
            modositgomb.innerText='Módosít';
            modositgomb.id="modosit";
            tdtorles.appendChild(torlesgomb);
            tdtorles.appendChild(modositgomb);
            tr.appendChild(tdnev);
            tr.appendChild(tdhelyszin);
            tr.appendChild(tddatum);
            tr.appendChild(tdtorles);
            lista.appendChild(tr);
            tábla[idx]=palya;
        }
    );
    }

    async function mentes() {
        const nev = document.getElementById('nev').value;
        const helyszin = document.getElementById('helyszin').value;
        const datum = document.getElementById('datum').value;

         fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nev, helyszin, datum })
        });
        document.getElementById('nev').value='';
        document.getElementById('helyszin').value='';
        document.getElementById('datum').value='';

        betoltes();
    }

    async function torles(id) {
         fetch(API_URL, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ azon: id })
        });
        betoltes();
    }
    const modosit = (idx) =>{
           document.getElementById('nev').value=tábla[idx].nev;
            document.getElementById('helyszin').value=tábla[idx].helyszin;
             document.getElementById('datum').value=tábla[idx].datum;
            
            const gombok=document.getElementById('modositment');
            gombok.innerHTML='<button className="gomb" id="meger" >Módosítás</button><button className="gomb" onclick="megse()">Mégsem</button>'
            document.getElementById('meger').addEventListener('click',function (){modositveg( tábla[idx].azon)})
        }
    const megse =() =>{
             document.getElementById('nev').value='';
        document.getElementById('helyszin').value='';
        document.getElementById('datum').value='';
        const gombok=document.getElementById('modositment');
        gombok.innerHTML='<button  class="gomb" onclick="mentes()">Rögzítés</button>';
        }
    const modositveg=async(mod) =>{

        const nev = document.getElementById('nev').value;
        const helyszin = document.getElementById('helyszin').value;
        const datum = document.getElementById('datum').value;
           await fetch(API_URL,{
                method:'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nev: nev, helyszin: helyszin,datum :datum, azon:mod })

            });
            document.getElementById('nev').value='';
        document.getElementById('helyszin').value='';
        document.getElementById('datum').value='';
        betoltes();
        }


    betoltes();
</script>

    <footer>Gyurászik György Marcell - ZX4R0A | Patkós Máté - CS9R44</footer>
</body>
